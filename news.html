<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tin tức | Bhome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Prata&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="news" class="app-loading">
  <div class="announcement-bar hidden" id="announcementBar">
    <div class="announcement-icon" aria-hidden="true">!</div>
    <div class="announcement-track">
      <div class="announcement-content" id="announcementContent"></div>
      <div class="announcement-content" id="announcementContentClone" aria-hidden="true"></div>
    </div>
    <button class="announcement-close" id="announcementClose" type="button" aria-label="Đóng thông báo">×</button>
  </div>
  <div class="site-shell">
    <nav class="main-nav">
      <a class="brand-lockup" href="index.html">
        <span class="brand-mark" id="brandMarkText">NH</span>
        <img class="brand-logo-image hidden" id="brandLogoImage" alt="Logo công ty">
        <div>
          <p class="eyebrow" id="brandEyebrow">Nền tảng đầu tư căn hộ</p>
          <h1 id="companyName">Bhome</h1>
        </div>
      </a>
      <div class="nav-links" id="primaryNav">
        <a href="index.html#gioi-thieu" id="navAboutLabel">Giới Thiệu</a>
        <a href="rooms.html" id="navRoomsLabel">Tìm Phòng</a>
        <a href="news.html" id="navNewsLabel">Tin Tức</a>
        <a href="admin-login.html" id="navAdminLabel">Admin</a>
      </div>
    </nav>

    <main>
      <section class="content-section detail-page-hero">
        <p class="section-kicker" id="newsPageKicker">Tin tức</p>
        <h2 id="newsPageTitle">Bài viết, tuyển dụng và thông báo mới</h2>
        <p id="newsPageDescription">Theo dõi cập nhật hoạt động, bài viết thị trường, chương trình tuyển dụng và các thông báo mới từ Bhome.</p>
      </section>

      <section class="content-section">
        <div class="news-grid" id="newsPageGrid"></div>
      </section>
    </main>
  </div>

  <div class="floating-contact" id="floatingContact">
    <button class="floating-toggle floating-toggle-compact" id="contactToggle" type="button" aria-label="Liên hệ">☎</button>
    <div class="floating-card hidden" id="contactCard">
      <h3 id="contactTitle">Thông tin liên hệ</h3>
      <a id="contactPhoneLink" href="#">SĐT</a>
      <a id="contactZaloLink" href="#" target="_blank" rel="noreferrer">Zalo</a>
      <a id="contactFacebookLink" href="#" target="_blank" rel="noreferrer">Facebook</a>
    </div>
  </div>

  <script src="shared-data.js"></script>
  <script src="public-app.js"></script>
</body>
</html>
