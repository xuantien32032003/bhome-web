<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiet toa nha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Prata&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="building-detail">
  <div class="site-shell">
    <nav class="main-nav">
      <a class="brand-lockup" href="index.html">
        <span class="brand-mark" id="brandMarkText">NH</span>
        <img class="brand-logo-image hidden" id="brandLogoImage" alt="Logo cong ty">
        <div>
          <p class="eyebrow" id="brandEyebrow">Apartment Investment Platform</p>
          <h1 id="companyName">Nova Habitat Holdings</h1>
        </div>
      </a>
      <div class="nav-links">
        <a href="index.html#gioi-thieu" id="navAboutLabel">Gioi Thieu</a>
        <a href="rooms.html" id="navRoomsLabel">Tim Phong</a>
        <a href="admin-login.html" id="navAdminLabel">Admin</a>
      </div>
    </nav>

    <main>
      <section class="content-section detail-page-hero">
        <p class="section-kicker" id="detailPageKicker">Chi tiet toa nha</p>
        <h2 id="detailPageTitle">Thong tin toa nha</h2>
        <p id="detailPageSummary"></p>
      </section>

      <section class="content-section detail-gallery-layout">
        <div class="detail-main-image">
          <img id="detailMainImage" alt="Anh toa nha">
        </div>
        <div class="detail-thumb-grid" id="detailThumbGrid"></div>
      </section>

      <section class="content-section detail-grid" id="detailContentGrid"></section>

      <section class="content-section">
        <div class="section-header">
          <div>
            <p class="section-kicker" id="detailRoomsSectionKicker">Phong thuoc toa nha</p>
            <h2 id="detailRoomsSectionTitle">Danh muc phong lien quan</h2>
          </div>
          <a class="primary-button button-inline" href="rooms.html" id="detailRoomsButton">Mo trang tim phong</a>
        </div>
        <div class="room-grid" id="detailRoomsGrid"></div>
      </section>
    </main>
  </div>

  <div class="floating-contact" id="floatingContact">
    <button class="floating-toggle" id="contactToggle" type="button">Lien he</button>
    <div class="floating-card hidden" id="contactCard">
      <h3 id="contactTitle">Thong tin lien he</h3>
      <a id="contactPhoneLink" href="#">SDT</a>
      <a id="contactZaloLink" href="#" target="_blank" rel="noreferrer">Zalo</a>
      <a id="contactFacebookLink" href="#" target="_blank" rel="noreferrer">Facebook</a>
    </div>
  </div>

  <script src="shared-data.js"></script>
  <script src="public-app.js"></script>
</body>
</html>
